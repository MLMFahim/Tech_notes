<!DOCTYPE html>
<html>
<head>
    <title>Edit Note</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 40px; }
        .container { max-width: 500px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { background: #38bdf8; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Edit Topic</h2>
        <form action="{{ url_for('edit_note', title=note.title) }}" method="POST">
            <label>Title</label>
            <input type="text" name="title" value="{{ note.title }}" required>
            
            <label>Category</label>
            <select name="category">
                <option value="PLC & Automation" {% if note.category == 'PLC & Automation' %}selected{% endif %}>PLC & Automation</option>
                <option value="Python Development" {% if note.category == 'Python Development' %}selected{% endif %}>Python Development</option>
                <option value="Electrical Eng" {% if note.category == 'Electrical Eng' %}selected{% endif %}>Electrical Eng</option>
                <option value="CSS/Web Design" {% if note.category == 'CSS/Web Design' %}selected{% endif %}>CSS/Web Design</option>
            </select>
            
            <label>Main Description</label>
            <textarea name="description" rows="5">{{ note.description }}</textarea>
            
            <button type="submit">Update Card</button>
            <div style="text-align: center; margin-top: 15px;">
                <a href="{{ url_for('home') }}" style="color: #94a3b8; text-decoration: none;">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
