<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Logbook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .sorting-bar { display: flex; gap: 10px; margin-bottom: 20px; background: #1e293b; padding: 10px; border-radius: 10px; align-items: center; }
        .sort-btn { text-decoration: none; color: #94a3b8; font-size: 14px; padding: 8px 15px; border-radius: 8px; background: #0f172a; }
        .sort-btn.active { background: var(--blue); color: #0f172a; font-weight: bold; }
        .log-card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 4px solid var(--blue); margin-bottom: 20px; }
        .btn-group { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid #334155; padding-top: 15px; }
        input, select, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <h2 style="color: var(--blue);">TECH_LOGBOOK</h2>
        <a href="/login" style="color: #ef4444; text-decoration: none;">Logout</a>
    </div>

    <div style="background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 30px;">
        <form action="/home" method="POST">
            <input type="text" name="title" placeholder="Topic Title" required>
            <select name="category"><option>PLC & Automation</option><option>Python Development</option></select>
            <textarea name="details" placeholder="Main Description..." required></textarea>
            <textarea name="code" placeholder="Ladder/Code Logic..."></textarea>
            <button type="submit" style="width: 100%; background: var(--blue); padding: 12px; border: none; border-radius: 8px; font-weight: bold;">Create Card</button>
        </form>
    </div>

    <div class="sorting-bar">
        <span style="font-size: 13px; color: #64748b;">Sort by:</span>
        <a href="{{ url_for('home', sort='date') }}" class="sort-btn {{ 'active' if current_sort == 'date' }}">📅 Calendar</a>
        <a href="{{ url_for('home', sort='title') }}" class="sort-btn {{ 'active' if current_sort == 'title' }}">🔤 Topic</a>
    </div>

    {% for title, data in notes %}
    <div class="log-card">
        <small style="color: var(--blue);">{{ data[0] }} {{ data[4] }}</small>
        <h3 style="margin: 10px 0;">{{ title }}</h3>
        {% if data[1] and data[1]|length > 0 %}
    <p style="color: #94a3b8; font-size: 14px;">{{ data[1][0]['text'] }}</p>
{% else %}
    <p style="color: #94a3b8; font-size: 14px;">No text available.</p>
{% endif %}
        <small style="color: #64748b;"><i class="far fa-clock"></i> {{ data[2] }}</small>
        <div class="btn-group">
            <a href="{{ url_for('details', title=title) }}" style="color: var(--blue); text-decoration: none;"><i class="fas fa-eye"></i> View Details</a>    
            <a href="{{ url_for('details', title=title) }}" class="edit-btn"><i class="fas fa-edit"></i> Edit</a>
            <a href="{{ url_for('delete_main', title=title) }}" style="color: #ef4444; text-decoration: none;" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i> Delete</a>
        </div>
    </div>
    {% endfor %}
</body>
</html>
